services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      # Hot reload: mount source code for development (writable for reload)
      - ./src:/app/src
      - ./.chainlit:/app/.chainlit
      - ./public:/app/public
      - ./chainlit.md:/app/chainlit.md
      - ./chainlit_en-US.md:/app/chainlit_en-US.md
      # GCP credentials for Vertex AI
      - ./secrets:/app/secrets:ro
      # Mount dependency files for updates
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    command: ["uv", "run", "chainlit", "run", "src/summit_sim/main.py", "--host", "0.0.0.0", "--port", "8000", "--watch"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
